<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"></stop>
      <stop offset="1" stop-color="#0f172a"></stop>
    </linearGradient>
    <linearGradient id="concrete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2e8f0"></stop>
      <stop offset="1" stop-color="#94a3b8"></stop>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"></stop>
      <stop offset="1" stop-color="#ea580c"></stop>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="600" height="420" fill="url(#bg)"></rect>
  <g stroke="#334155" stroke-width="1" opacity="0.35">
    <line x1="0" y1="60" x2="600" y2="60"></line>
    <line x1="0" y1="120" x2="600" y2="120"></line>
    <line x1="0" y1="360" x2="600" y2="360"></line>
  </g>
  <!-- patin de concreto -->
  <rect x="50" y="300" width="500" height="58" rx="4" fill="url(#concrete)" stroke="#64748b" stroke-width="2"></rect>
  <rect x="50" y="300" width="500" height="10" rx="4" fill="#f1f5f9" opacity="0.7"></rect>
  <!-- cuerda inferior (acero) -->
  <line x1="70" y1="290" x2="530" y2="290" stroke="url(#steel)" stroke-width="7" stroke-linecap="round"></line>
  <!-- alma abierta triangular -->
  <polyline points="70,288 127,128 184,288 241,128 298,288 355,128 412,288 469,128 526,288" fill="none" stroke="url(#steel)" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"></polyline>
  <!-- cuerda superior -->
  <line x1="127" y1="128" x2="469" y2="128" stroke="url(#steel)" stroke-width="7" stroke-linecap="round"></line>
  <!-- nodos -->
  <g fill="#fff7ed" stroke="#ea580c" stroke-width="2">
    <circle cx="127" cy="128" r="5"></circle><circle cx="241" cy="128" r="5"></circle>
    <circle cx="355" cy="128" r="5"></circle><circle cx="469" cy="128" r="5"></circle>
  </g>
  <text x="300" y="392" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">SEMIVIGUETA DE ALMA ABIERTA</text>
</svg>
